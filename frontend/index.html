<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login | ilCapo</title>
<link rel="stylesheet" href="./assets/css/login.css">
<link rel="icon" type="image/png" href="./assets/icons/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

<div class="login-wrapper">

  <!-- HERO IZQUIERDA (ESTILO HOME CLIENTE) -->
  <div class="login-hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <h1>Bienvenido a ilCapo</h1>

      <p>
        El sistema de gestión más simple para pizzerías.<br>
        Controlá pedidos, stock y ventas en un solo lugar.
      </p>

      <div class="hero-bullets">
        <div>🍕 Pedidos rápidos</div>
        <div>📦 Stock en tiempo real</div>
        <div>📊 Reportes automáticos</div>
      </div>

    </div>

  </div>

  <!-- LOGIN DERECHA -->
  <div class="login-panel">

    <div class="login-card">

      <div class="logo">
        <img src="./assets/img/logo.png">
        <h2>ilCapo</h2>
      </div>

      <h3>Iniciar sesión</h3>
      <p>Ingresá tus datos para continuar</p>

      <input type="text" id="user" placeholder="Usuario">
      <input type="password" id="pass" placeholder="Contraseña">

      <button onclick="login()">Entrar</button>
      <button class="btn-register" onclick="register()">
        Crear cuenta
    </button>

      <span class="footer">Sistema • ilCapo</span>

    </div>

  </div>

</div>

<script src="./assets/js/login.js"></script>

</body>
</html>
