<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ilCapo ERP | Login</title>

<link rel="stylesheet" href="assets/css/dashboard.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#1e1e1e}
.login-box{background:#fff;padding:30px;border-radius:12px;width:300px;text-align:center}
input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:8px}

</style>

</head>

<body>

<div class="login-box">
<h2>🍕 ilCapo ERP</h2>

<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

</div>

<script src="assets/js/main.js"></script>

</body>
</html>
