<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Reportes | ilCapo</title>

<link rel="stylesheet" href="../assets/css/dashboard.css">
<link rel="icon" type="image/png" href="../assets/icons/favicon.ico" />
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="brand">
    <div>
      <h2>ilCapo</h2>
      <span>Admin Panel</span>
    </div>
  </div>

  <nav class="menu">
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="pizzas.html">🍕 Pizzas</a>
    <a href="ingredientes.html">🧀 Ingredientes</a>
    <a href="pedidos.html">📦 Pedidos</a>
    <a href="proveedores.html">🚚 Proveedores</a>
    <a href="clientes.html">👥 Clientes</a>
    <a href="reportes.html" class="active">📈 Reportes</a>
  </nav>

  <div class="logoutBox">
    <button onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h3>📈 Reportes</h3>
  </div>

  <div class="content">

    <!-- KPI -->
    <div class="reports-grid">

      <div class="card">
        <h3>Total pedidos</h3>
        <p id="totalPedidos">0</p>
      </div>

      <div class="card">
        <h3>Clientes activos</h3>
        <p id="totalClientes">0</p>
      </div>

      <div class="card">
        <h3>Ingresos estimados</h3>
        <p id="ingresos">$0</p>
      </div>

    </div>

    <!-- CHARTS -->
    <div class="charts-grid">

      <div class="chart-card">
        <h3>📊 Estado de pedidos</h3>
        <canvas id="chartEstados"></canvas>
      </div>

      <div class="chart-card">
        <h3>🍕 Pizzas más vendidas</h3>
        <canvas id="chartPizzas"></canvas>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/reportes.js"></script>

</body>
</html>
