<div class="content">

<div class="cards">

<div class="card">
<h3>Proveedor 1</h3>
<p>Lácteos SRL</p>
<button onclick="reponer()">Reponer stock</button>
</div>

<div class="card">
<h3>Proveedor 2</h3>
<p>Panificados SA</p>
<button onclick="reponer()">Reponer stock</button>
</div>

</div>

</div>

</div>

<script src="../assets/js/main.js"></script>

<script>
protectAdmin();

function reponer(){

let ing = JSON.parse(localStorage.getItem("stock")) || {
mozzarella: 2,
salsa: 2,
prepizza: 5,
jamon: 1
};

ing.mozzarella += 10;
ing.salsa += 10;
ing.prepizza += 20;
ing.jamon += 5;

localStorage.setItem("stock", JSON.stringify(ing));

alert("Stock repuesto desde proveedor ✔");
}
</script>
