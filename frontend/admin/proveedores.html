<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Proveedores | ilCapo</title>
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="icon" type="image/png" href="../assets/icons/favicon.ico" />
  </head>

  <body>
    <div class="sidebar">
      <div class="brand">
        <div>
          <h2>ilCapo</h2>
          <span>Admin Panel</span>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="pizzas.html">🍕 Pizzas</a>
        <a href="ingredientes.html">🧀 Ingredientes</a>
        <a href="pedidos.html">📦 Pedidos</a>
        <a href="proveedores.html" class="active">🚚 Proveedores</a>
        <a href="clientes.html">👥 Clientes</a>
        <a href="reportes.html">📈 Reportes</a>
      </nav>

      <div class="logoutBox">
        <button onclick="logout()">Cerrar sesión</button>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <h3>🚚 Proveedores</h3>
      </div>

      <div class="content">
        <div class="cards">
          <div class="card">
            <h3>Proveedor 1</h3>
            <p>Lácteos SRL</p>
          </div>

          <div class="card">
            <h3>Proveedor 2</h3>
            <p>Panificados SA</p>
          </div>
        </div>

        <!-- FORM PEDIDO -->
        <div class="card" style="margin-top: 20px">
          <h3>🧾 Hacer pedido a proveedor</h3>

          <select id="proveedor">
            <option value="Lácteos SRL">Lácteos SRL</option>
            <option value="Panificados SA">Panificados SA</option>
          </select>

          <select id="ingrediente">
            <option value="mozzarella">Mozzarella</option>
            <option value="salsa">Salsa</option>
            <option value="prepizza">Prepizza</option>
            <option value="jamon">Jamón</option>
            <option value="anchoas">Anchoas</option>
            <option value="ternera">Ternera</option>
            <option value="calabresa">Calabresa</option>
            <option value="roquefort">Roquefort</option>
          </select>

          <input id="cantidad" type="number" placeholder="Cantidad" />

          <button onclick="hacerPedidoProveedor()">Enviar pedido</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/main.js"></script>

    <script>
      protectAdmin();

      function reponer() {
        let ing = JSON.parse(localStorage.getItem("stock")) || {
          mozzarella: 2,
          salsa: 2,
          prepizza: 5,
          jamon: 1,
        };

        ing.mozzarella += 10;
        ing.salsa += 10;
        ing.prepizza += 20;
        ing.jamon += 5;

        localStorage.setItem("stock", JSON.stringify(ing));

        alert("Stock repuesto desde proveedor ✔");
      }
    </script>
  </body>
</html>
